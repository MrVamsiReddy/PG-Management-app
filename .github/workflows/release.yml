name: Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the APK to (e.g. v2.8.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-attach:
    name: Build APK & attach to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Set up release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.keystore
          EOF
      - run: flutter build apk --release -t lib/main_owner.dart
      - run: cp build/app/outputs/flutter-apk/app-release.apk PG-Management-Owner.apk
      - run: flutter build apk --release -t lib/main_tenant.dart
      - run: cp build/app/outputs/flutter-apk/app-release.apk PG-Management-Tenant.apk
      # Back-compat alias for existing invite links (tenant build).
      - run: cp PG-Management-Tenant.apk PG-Management.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            PG-Management-Owner.apk
            PG-Management-Tenant.apk
            PG-Management.apk
