name: iOS IPA

# Manual-trigger only: iOS builds are paused until explicitly needed.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach IPAs to (leave empty to only upload artifacts)'
        required: false

permissions:
  contents: write

jobs:
  build-ios:
    name: Build unsigned IPAs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign -t lib/main_owner.dart
      - run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qry PG-Management-Owner.ipa Payload
          rm -rf Payload
      - run: flutter build ios --release --no-codesign -t lib/main_tenant.dart
      - run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qry PG-Management-Tenant.ipa Payload
          rm -rf Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: '*.ipa'
      - uses: softprops/action-gh-release@v2
        if: ${{ inputs.tag != '' || startsWith(github.ref, 'refs/tags/') }}
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            PG-Management-Owner.ipa
            PG-Management-Tenant.ipa
